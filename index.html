<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loader de JS</title>
</head>
<body>

<script>
function carregarScript() {
    const s = document.createElement("script");
    s.src = "script.js";
    document.body.appendChild(s);
}

function temIframeDiscord() {
    const iframes = document.querySelectorAll("iframe");
    for (let iframe of iframes) {
        if (iframe.src && iframe.src.includes("https://discord.com/app")) {
            return true;
        }
    }
    return false;
}

const paginaAtual = window.location.href;

if (paginaAtual.startsWith("https://discord.com/app")) {
    carregarScript();
} else if (temIframeDiscord()) {
    carregarScript();
}
</script>

</body>
</html>
